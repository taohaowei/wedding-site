# =====================================================================
# 赴约婚礼请柬 · Nginx 站点配置
# 域名:www.mynight.top  /  mynight.top
# 部署:阿里云香港 ECS,直连(不走 CDN)
# 静态根目录:/var/www/wedding/frontend/dist
# 反代后端:127.0.0.1:3001(由 PM2 守护的 Hono 进程)
#
# 说明:
#   1. SSL 证书路径占位为 Let's Encrypt 默认安装位置(certbot --nginx)
#      首次部署前请先用 setup-ssl.sh 申请证书,certbot 会自动改写
#      ssl_certificate / ssl_certificate_key 两行;若你手动管理证书,
#      请将下面两行替换为你证书的实际路径。
#   2. CSP 暂未开启(避免 inline script 报错),后续如需加可在
#      "安全头" 区块追加 add_header Content-Security-Policy ... ;
# =====================================================================

# ---------- 80 端口:全部 301 跳到 https ----------
server {
    listen      80;
    listen [::]:80;
    server_name www.mynight.top mynight.top;

    # ACME http-01 挑战(certbot 续期会用到这个路径)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://www.mynight.top$request_uri;
    }
}

# ---------- 443 端口:主站 ----------
server {
    listen      443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.mynight.top mynight.top;

    # ----- SSL 证书(certbot 自动写入,占位路径) -----
    ssl_certificate     /etc/letsencrypt/live/www.mynight.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.mynight.top/privkey.pem;
    ssl_session_timeout    1d;
    ssl_session_cache      shared:MyNightSSL:10m;
    ssl_session_tickets    off;
    ssl_protocols          TLSv1.2 TLSv1.3;
    ssl_ciphers            ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # ----- 安全头 -----
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    # CSP 暂不开启,等前端确认所有外链来源后再加

    # ----- gzip(图片为 webp 不二次压缩,音频不压缩) -----
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_min_length     1024;
    gzip_comp_level     6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # ----- 上传体大小(RSVP 表单几 KB 足够) -----
    client_max_body_size 1m;

    # ----- 站点根 -----
    root  /var/www/wedding/frontend/dist;
    index index.html;

    # ----- 日志 -----
    access_log /var/log/nginx/mynight.access.log;
    error_log  /var/log/nginx/mynight.error.log warn;

    # ----- 静态资源:Vite hash 文件长缓存(1 年 immutable) -----
    location ^~ /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files  $uri =404;
    }

    # 公共目录里的图片/音频也长缓存(无 hash,但变更可改文件名)
    location ~* ^/(photos|illustrations|audio)/.+\.(webp|png|jpe?g|svg|mp3|mp4|m4a|woff2?)$ {
        expires    30d;
        add_header Cache-Control "public";
        access_log off;
        try_files  $uri =404;
    }

    # ----- API 反代到 Hono(127.0.0.1:3001) -----
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
        proxy_buffering       off;
    }

    # ----- 隐藏文件 / 敏感后缀拒绝访问 -----
    location ~* \.(db|sqlite|sqlite3|map|env|bak|swp)$ {
        deny all;
        return 404;
    }
    location ~ /\. {
        deny all;
        return 404;
    }

    # ----- index.html 不缓存,确保发版后立刻生效 -----
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # ----- SPA fallback(/admin 也走这里,前端路由) -----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
