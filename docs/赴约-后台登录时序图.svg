<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="sans-serif">
  <rect width="1400" height="900" fill="#FAF6F0"/>

  <text x="700" y="40" font-size="24" font-weight="700" fill="#1A1F36" text-anchor="middle">赴约 · 后台登录与 RSVP 查询时序图</text>
  <text x="700" y="64" font-size="13" fill="#6E5C8E" text-anchor="middle">新人访问 /admin → 输密码 → 看 RSVP 列表 → 一键导出 CSV</text>

  <!-- 4 个泳道 -->
  <g font-size="13" font-weight="700" fill="#1A1F36" text-anchor="middle">
    <rect x="160" y="100" width="200" height="44" rx="6" fill="#FFF" stroke="#6E5C8E" stroke-width="2"/>
    <text x="260" y="128">新人 (PC 浏览器)</text>

    <rect x="460" y="100" width="200" height="44" rx="6" fill="#FFF" stroke="#6E5C8E" stroke-width="2"/>
    <text x="560" y="128">Nginx (443)</text>

    <rect x="760" y="100" width="200" height="44" rx="6" fill="#FFF" stroke="#F5A572" stroke-width="2"/>
    <text x="860" y="128">Hono · /api/admin/*</text>

    <rect x="1060" y="100" width="220" height="44" rx="6" fill="#FFF" stroke="#1A1F36" stroke-width="2"/>
    <text x="1170" y="128">SQLite (rsvps + sessions)</text>
  </g>

  <g stroke="#6E5C8E" stroke-width="1" stroke-dasharray="4,4">
    <line x1="260" y1="148" x2="260" y2="850"/>
    <line x1="560" y1="148" x2="560" y2="850"/>
    <line x1="860" y1="148" x2="860" y2="850"/>
    <line x1="1170" y1="148" x2="1170" y2="850"/>
  </g>

  <!-- ① GET /admin -->
  <g>
    <line x1="260" y1="180" x2="560" y2="180" stroke="#F5A572" stroke-width="2.5" marker-end="url(#arr2)"/>
    <text x="410" y="172" font-size="12" fill="#1A1F36" text-anchor="middle">① GET /admin</text>
  </g>
  <g>
    <line x1="560" y1="210" x2="260" y2="210" stroke="#F5A572" stroke-width="2.5" marker-end="url(#arr2)"/>
    <text x="410" y="202" font-size="12" fill="#1A1F36" text-anchor="middle">② SPA fallback → 同一份 index.html</text>
  </g>

  <!-- ③ AdminPage 渲染 -->
  <g>
    <rect x="240" y="230" width="40" height="60" fill="#6E5C8E" opacity="0.2"/>
    <text x="260" y="254" font-size="10" fill="#1A1F36" text-anchor="middle">SPA</text>
    <text x="260" y="270" font-size="10" fill="#1A1F36" text-anchor="middle">渲染</text>
    <text x="260" y="286" font-size="10" fill="#1A1F36" text-anchor="middle">登录页</text>
  </g>
  <text x="320" y="266" font-size="11" fill="#6E5C8E">③ Vue Router 匹配 /admin → AdminPage 显示密码框</text>

  <!-- ④ 输入密码 + POST /api/admin/login -->
  <g>
    <line x1="260" y1="320" x2="560" y2="320" stroke="#F5A572" stroke-width="2.5" marker-end="url(#arr2)"/>
    <text x="410" y="312" font-size="12" fill="#1A1F36" text-anchor="middle">④ POST /api/admin/login { password }</text>
  </g>
  <g>
    <line x1="560" y1="350" x2="860" y2="350" stroke="#F5A572" stroke-width="2.5" marker-end="url(#arr2)"/>
    <text x="710" y="342" font-size="12" fill="#1A1F36" text-anchor="middle">⑤ proxy_pass → 127.0.0.1:3000</text>
  </g>

  <!-- ⑥ Hono 校验 -->
  <g>
    <rect x="840" y="370" width="40" height="100" fill="#F5A572" opacity="0.25"/>
    <text x="860" y="394" font-size="10" fill="#1A1F36" text-anchor="middle">校验</text>
    <text x="860" y="410" font-size="10" fill="#1A1F36" text-anchor="middle">bcrypt</text>
    <text x="860" y="426" font-size="10" fill="#1A1F36" text-anchor="middle">.compare</text>
    <text x="860" y="442" font-size="10" fill="#1A1F36" text-anchor="middle">生成</text>
    <text x="860" y="458" font-size="10" fill="#1A1F36" text-anchor="middle">token</text>
  </g>
  <text x="940" y="394" font-size="11" fill="#1A1F36">⑥ 与 .env 中 ADMIN_PASSWORD_HASH 比对</text>
  <text x="940" y="412" font-size="11" fill="#1A1F36">crypto.randomBytes(32).toString('hex')</text>

  <!-- ⑦ 写 sessions 表 -->
  <g>
    <line x1="860" y1="490" x2="1170" y2="490" stroke="#6E5C8E" stroke-width="2" marker-end="url(#arr2)"/>
    <text x="1015" y="482" font-size="12" fill="#1A1F36" text-anchor="middle">⑦ INSERT INTO admin_sessions(token, expires_at)</text>
  </g>
  <g>
    <line x1="1170" y1="520" x2="860" y2="520" stroke="#6E5C8E" stroke-width="2" marker-end="url(#arr2)"/>
    <text x="1015" y="512" font-size="11" fill="#1A1F36" text-anchor="middle">OK</text>
  </g>

  <!-- ⑧ 返回 Set-Cookie -->
  <g>
    <line x1="860" y1="550" x2="560" y2="550" stroke="#F5A572" stroke-width="2.5" marker-end="url(#arr2)"/>
    <text x="710" y="542" font-size="12" fill="#1A1F36" text-anchor="middle">⑧ 200 + Set-Cookie: admin=token; HttpOnly; Secure; SameSite=Lax</text>
  </g>
  <g>
    <line x1="560" y1="580" x2="260" y2="580" stroke="#F5A572" stroke-width="2.5" marker-end="url(#arr2)"/>
    <text x="410" y="572" font-size="12" fill="#1A1F36" text-anchor="middle">⑨ Nginx 透传 cookie</text>
  </g>

  <!-- ⑩ GET /api/admin/rsvps -->
  <g>
    <line x1="260" y1="620" x2="860" y2="620" stroke="#6E5C8E" stroke-width="2" marker-end="url(#arr2)"/>
    <text x="560" y="612" font-size="12" fill="#1A1F36" text-anchor="middle">⑩ GET /api/admin/rsvps  (Cookie: admin=...)</text>
  </g>

  <!-- ⑪ 中间件验 token -->
  <g>
    <rect x="840" y="640" width="40" height="80" fill="#6E5C8E" opacity="0.2"/>
    <text x="860" y="664" font-size="10" fill="#1A1F36" text-anchor="middle">authMW</text>
    <text x="860" y="680" font-size="10" fill="#1A1F36" text-anchor="middle">查 session</text>
    <text x="860" y="696" font-size="10" fill="#1A1F36" text-anchor="middle">expires</text>
    <text x="860" y="712" font-size="10" fill="#1A1F36" text-anchor="middle">检查</text>
  </g>
  <g>
    <line x1="860" y1="730" x2="1170" y2="730" stroke="#6E5C8E" stroke-width="2" marker-end="url(#arr2)"/>
    <text x="1015" y="722" font-size="12" fill="#1A1F36" text-anchor="middle">⑪ SELECT * FROM rsvps ORDER BY created_at DESC</text>
  </g>
  <g>
    <line x1="1170" y1="760" x2="260" y2="760" stroke="#F5A572" stroke-width="2.5" marker-end="url(#arr2)"/>
    <text x="700" y="752" font-size="12" fill="#1A1F36" text-anchor="middle">⑫ 200 [{...}, {...}] → 表格渲染</text>
  </g>

  <!-- ⑬ 导出 CSV -->
  <g>
    <line x1="260" y1="800" x2="860" y2="800" stroke="#F5A572" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr2)"/>
    <text x="560" y="792" font-size="12" fill="#1A1F36" text-anchor="middle">⑬ 点击「导出 CSV」 → GET /api/admin/export.csv → 文件流下载</text>
  </g>

  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6E5C8E"/>
    </marker>
  </defs>
</svg>
