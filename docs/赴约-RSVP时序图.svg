<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="sans-serif">
  <rect width="1400" height="900" fill="#FAF6F0"/>

  <text x="700" y="40" font-size="24" font-weight="700" fill="#1A1F36" text-anchor="middle">赴约 · RSVP 提交时序图</text>
  <text x="700" y="64" font-size="13" fill="#6E5C8E" text-anchor="middle">宾客打开请柬 → 浏览 → 填表 → 提交 → 收到反馈</text>

  <!-- 5 个泳道 -->
  <g font-size="13" font-weight="700" fill="#1A1F36" text-anchor="middle">
    <rect x="100" y="100" width="180" height="44" rx="6" fill="#FFF" stroke="#F5A572" stroke-width="2"/>
    <text x="190" y="128">宾客 · 浏览器</text>

    <rect x="340" y="100" width="180" height="44" rx="6" fill="#FFF" stroke="#F5A572" stroke-width="2"/>
    <text x="430" y="128">Cloudflare CDN</text>

    <rect x="580" y="100" width="180" height="44" rx="6" fill="#FFF" stroke="#6E5C8E" stroke-width="2"/>
    <text x="670" y="128">Nginx (443)</text>

    <rect x="820" y="100" width="180" height="44" rx="6" fill="#FFF" stroke="#6E5C8E" stroke-width="2"/>
    <text x="910" y="128">Vue SPA</text>

    <rect x="1060" y="100" width="180" height="44" rx="6" fill="#FFF" stroke="#1A1F36" stroke-width="2"/>
    <text x="1150" y="128">Hono + SQLite</text>
  </g>

  <!-- 5 条竖向生命线 -->
  <g stroke="#6E5C8E" stroke-width="1" stroke-dasharray="4,4">
    <line x1="190" y1="148" x2="190" y2="850"/>
    <line x1="430" y1="148" x2="430" y2="850"/>
    <line x1="670" y1="148" x2="670" y2="850"/>
    <line x1="910" y1="148" x2="910" y2="850"/>
    <line x1="1150" y1="148" x2="1150" y2="850"/>
  </g>

  <!-- 步骤 -->
  <!-- 1 GET / -->
  <g>
    <line x1="190" y1="180" x2="430" y2="180" stroke="#F5A572" stroke-width="2" marker-end="url(#arrSeq)"/>
    <text x="310" y="172" font-size="12" fill="#1A1F36" text-anchor="middle">① GET https://mynight.top/</text>
  </g>
  <g>
    <line x1="430" y1="210" x2="670" y2="210" stroke="#F5A572" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrSeq)"/>
    <text x="550" y="202" font-size="11" fill="#6E5C8E" text-anchor="middle">缓存命中:命中则直接返回 / miss 回源</text>
  </g>
  <g>
    <line x1="670" y1="240" x2="430" y2="240" stroke="#F5A572" stroke-width="2" marker-end="url(#arrSeq)"/>
    <text x="550" y="232" font-size="11" fill="#1A1F36" text-anchor="middle">200 index.html (no-cache) + dist/assets (long cache)</text>
  </g>
  <g>
    <line x1="430" y1="270" x2="190" y2="270" stroke="#F5A572" stroke-width="2" marker-end="url(#arrSeq)"/>
    <text x="310" y="262" font-size="11" fill="#1A1F36" text-anchor="middle">② 返回 SPA 资源</text>
  </g>

  <!-- 浏览器加载SPA -->
  <g>
    <rect x="170" y="290" width="40" height="80" fill="#F5A572" opacity="0.25"/>
    <text x="190" y="316" font-size="10" fill="#1A1F36" text-anchor="middle">解析</text>
    <text x="190" y="332" font-size="10" fill="#1A1F36" text-anchor="middle">挂载</text>
    <text x="190" y="348" font-size="10" fill="#1A1F36" text-anchor="middle">Vue</text>
    <text x="190" y="364" font-size="10" fill="#1A1F36" text-anchor="middle">App</text>
  </g>

  <!-- 滑动浏览 12 屏 -->
  <g>
    <line x1="190" y1="400" x2="910" y2="400" stroke="#6E5C8E" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrSeq)"/>
    <text x="550" y="392" font-size="12" fill="#6E5C8E" text-anchor="middle">③ 用户下滑浏览 屏1→屏10 (Swiper + GSAP 动效)</text>
  </g>

  <!-- 到达屏11 -->
  <g>
    <line x1="190" y1="440" x2="910" y2="440" stroke="#6E5C8E" stroke-width="2" marker-end="url(#arrSeq)"/>
    <text x="550" y="432" font-size="12" fill="#6E5C8E" text-anchor="middle">④ 到达屏 11,RsvpSection 渲染表单</text>
  </g>

  <!-- 5 填表&校验 -->
  <g>
    <rect x="890" y="460" width="40" height="80" fill="#6E5C8E" opacity="0.25"/>
    <text x="910" y="486" font-size="10" fill="#1A1F36" text-anchor="middle">前端</text>
    <text x="910" y="502" font-size="10" fill="#1A1F36" text-anchor="middle">VeeValidate</text>
    <text x="910" y="518" font-size="10" fill="#1A1F36" text-anchor="middle">+ zod</text>
    <text x="910" y="534" font-size="10" fill="#1A1F36" text-anchor="middle">校验</text>
  </g>
  <text x="980" y="490" font-size="11" fill="#6E5C8E">⑤ 用户填:姓名/出席/人数/住宿/忌口/留言</text>
  <text x="980" y="510" font-size="11" fill="#6E5C8E">本地校验通过 → 触发 onSubmit</text>

  <!-- 6 POST /api/rsvp -->
  <g>
    <line x1="910" y1="570" x2="670" y2="570" stroke="#F5A572" stroke-width="2.5" marker-end="url(#arrSeq)"/>
    <text x="790" y="562" font-size="12" fill="#1A1F36" text-anchor="middle">⑥ POST /api/rsvp { name, attending, headcount, ... }</text>
  </g>
  <g>
    <line x1="670" y1="600" x2="1150" y2="600" stroke="#F5A572" stroke-width="2.5" marker-end="url(#arrSeq)"/>
    <text x="910" y="592" font-size="12" fill="#1A1F36" text-anchor="middle">⑦ Nginx 反代 → 127.0.0.1:3000/api/rsvp</text>
  </g>

  <!-- 8 Hono 处理 -->
  <g>
    <rect x="1130" y="620" width="40" height="100" fill="#1A1F36" opacity="0.18"/>
    <text x="1150" y="644" font-size="10" fill="#1A1F36" text-anchor="middle">Hono</text>
    <text x="1150" y="660" font-size="10" fill="#1A1F36" text-anchor="middle">zod</text>
    <text x="1150" y="676" font-size="10" fill="#1A1F36" text-anchor="middle">校验+</text>
    <text x="1150" y="692" font-size="10" fill="#1A1F36" text-anchor="middle">限流</text>
    <text x="1150" y="708" font-size="10" fill="#1A1F36" text-anchor="middle">写库</text>
  </g>
  <text x="1080" y="650" font-size="11" fill="#1A1F36" text-anchor="end">⑧ 后端校验</text>
  <text x="1080" y="666" font-size="11" fill="#1A1F36" text-anchor="end">IP/UA 限频</text>
  <text x="1080" y="682" font-size="11" fill="#1A1F36" text-anchor="end">INSERT INTO rsvps</text>

  <!-- 9 返回 -->
  <g>
    <line x1="1150" y1="740" x2="670" y2="740" stroke="#6E5C8E" stroke-width="2" marker-end="url(#arrSeq)"/>
    <text x="910" y="732" font-size="12" fill="#1A1F36" text-anchor="middle">⑨ 200 OK { ok:true, id:42 }</text>
  </g>
  <g>
    <line x1="670" y1="770" x2="910" y2="770" stroke="#6E5C8E" stroke-width="2" marker-end="url(#arrSeq)"/>
    <text x="790" y="762" font-size="12" fill="#1A1F36" text-anchor="middle">⑩ Nginx 透传响应</text>
  </g>

  <!-- 11 反馈 -->
  <g>
    <line x1="910" y1="800" x2="190" y2="800" stroke="#F5A572" stroke-width="2.5" marker-end="url(#arrSeq)"/>
    <text x="550" y="792" font-size="12" fill="#1A1F36" text-anchor="middle">⑪ Toast/动画 + 自动滑到屏 12 致谢</text>
  </g>

  <!-- 错误分支 -->
  <g>
    <rect x="60" y="840" width="1300" height="40" rx="6" fill="#FFF" stroke="#6E5C8E"/>
    <text x="80" y="864" font-size="11" fill="#6E5C8E">异常分支:zod 校验失败 → 422 + errors[];限流命中 → 429;网络断开 → 前端重试 + localStorage 缓存草稿。</text>
  </g>

  <defs>
    <marker id="arrSeq" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6E5C8E"/>
    </marker>
  </defs>
</svg>
