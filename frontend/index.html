  <!-- Schema.org Event 结构化数据(搜索引擎友好) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Event",
    "name": "张三 ✕ 小美 婚礼",

      "@type": "Place",
      "name": "杭州 · 婚礼酒店 · 宴会厅",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "CN",
        "addressRegion": "浙江省",
        "addressLocality": "杭州市"
      }
    },
    "image": "https://your-domain.com/share-cover.jpg",
    "description": "张三与小美的婚礼"

  <style>
    html, body { background: #FAF6F0; color: #2D2118; }
    body, #app { margin: 0; padding: 0; min-height: 100dvh; min-height: calc(var(--vh, 1vh) * 100); }
    /* 首屏 loading 占位,防止白屏 */
    .__boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; font-family: serif; color: #6E5C8E; letter-spacing: .2em; }
    .__boot::after { content: '· · ·'; animation: __dot 1.4s infinite; }
    @keyframes __dot { 0%,100%{opacity:.3} 50%{opacity:1} }
  </style>
</head>
<body>
  <div id="app"><div class="__boot">L O A D I N G</div></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
